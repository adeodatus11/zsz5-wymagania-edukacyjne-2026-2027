name: Publish GitHub Pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pypdf

      - name: Validate static site
        run: |
          python -m py_compile generuj_kompletne_wymagania_ogolne.py
          python -m py_compile generuj_wymagania_edukacyjne_ZSZ5.py
          python -m py_compile scripts/validate_site.py
          python scripts/validate_site.py

      - name: Check embedded JavaScript
        run: |
          python - <<'PY' > /tmp/site.js
          from pathlib import Path
          import re
          html = Path("wymagania_edukacyjne_ZSZ5_2026_2027.html").read_text(encoding="utf-8")
          match = re.search(r"<script>([\s\S]*)</script>", html)
          print(match.group(1) if match else "")
          PY
          node --check /tmp/site.js

      - name: Prepare publish directory
        run: |
          mkdir -p public
          cp index.html public/
          cp wymagania_edukacyjne_ZSZ5_2026_2027.html public/
          cp CNAME public/
          cp .nojekyll public/
          cp -R assets data 01_BSI_stopnia 02_BSII_stopnia 03_Technikum public/
          find public \( -name '.DS_Store' -o -name 'Thumbs.db' -o -name '.~lock.*' \) -delete
          du -sh public
          find public -type f | wc -l

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish static site from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
